name: Update Schedules & Index

on:
  push:
    branches: [ master, main ]
    paths:
      - 'schedules/md/**'
      - 'schedules/script/mappings.json'
  workflow_dispatch:

jobs:
  update-schedules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Process Schedules & Generate Index
        run: python3 process_schedules.py --strict --md-only

      - name: Commit and Push Updated Dist Schedules
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto(schedules): update dist schedules and index"
          file_pattern: "schedules/dist/*"
